apiVersion: agenix/v0.1
kind: Skill
name: repo.analyze_test_failures.remote
version: 0.1.0
description: Analyze a failing pytest suite without modifying the repository.
capabilities:
  requires:
    tool_calling: true
    structured_output: true
    max_context_tokens: 32000
    reasoning_level: medium
tools:
  - fs
permissions:
  network: true
  filesystem:
    read:
      - ${repo_path}
    write:
inputs:
  repo_path: fixture
outputs:
  required:
    - analysis_summary
    - failing_tests
    - likely_root_cause
    - changed_files
verifiers:
  - type: command
    name: fixture_still_fails
    run: ["python3", "verify_failing.py"]
    cwd: ${repo_path}
    policy:
      executable: python3
      cwd: ${repo_path}
      timeout_ms: 120000
    success:
      exit_code: 0

  - type: schema
    name: output_schema_check
    schemaRef: outputs

recovery:
  strategy: checkpoint
  intervals: 5
