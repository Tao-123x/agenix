name: v0-release-gate

on:
  push:
    branches:
      - main
      - "codex/**"
      - "taox/**"
  pull_request:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python test dependencies
        run: python -m pip install pytest
      - name: Run V0 acceptance gate
        run: go run ./cmd/agenix acceptance
      - name: Run Go tests
        run: go test -count=1 ./...
      - name: Run Go vet
        run: go vet ./...
      - name: Build CLI
        run: go build ./cmd/agenix
