name: v0-release-gate

on:
  push:
    branches:
      - main
      - "codex/**"
      - "taox/**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-gate:
    name: release-gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python test dependencies
        run: python -m pip install pytest
      - name: Run V0 acceptance gate
        run: go run ./cmd/agenix acceptance
      - name: Run V0.2 authoring acceptance gate
        run: go run ./cmd/agenix acceptance --v0.2
      - name: Run V0.3 adapter readiness acceptance gate
        run: go run ./cmd/agenix acceptance --v0.3
      - name: Run Go tests
        run: go test -count=1 ./...
      - name: Run Go vet
        run: go vet ./...
      - name: Build CLI
        run: go build ./cmd/agenix
